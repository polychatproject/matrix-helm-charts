name: Publish PR Preview Charts
description: Detect changed charts for a PR and publish rolling and immutable OCI previews.

outputs:
  has_charts:
    description: Whether any charts were published
    value: ${{ steps.prepare.outputs.has_charts }}
  comment_payload:
    description: JSON payload describing published preview builds
    value: ${{ steps.payload.outputs.comment_payload }}

inputs:
  source-root:
    description: Repository checkout containing the PR source to publish
    required: true
  base-sha:
    description: Base commit SHA for the PR
    required: true
  head-sha:
    description: Head commit SHA for the PR
    required: true
  pr-number:
    description: Pull request number
    required: true
  preview-registry:
    description: OCI registry path without the oci:// prefix
    required: true
  ghcr-username:
    description: Username used for helm registry login
    required: true
  ghcr-password:
    description: Token used for helm registry login
    required: true

runs:
  using: composite
  steps:
    - name: Prepare preview charts
      id: prepare
      shell: bash
      run: |
        python3 "${{ github.action_path }}/../../scripts/publish_pr_preview_charts.py" detect \
          --repo-root "${{ inputs.source-root }}" \
          --charts-root "${{ inputs.source-root }}/charts" \
          --base-sha "${{ inputs.base-sha }}" \
          --head-sha "${{ inputs.head-sha }}" \
          --github-output "${GITHUB_OUTPUT}"

    - name: Publish previews
      if: steps.prepare.outputs.has_charts == 'true'
      shell: bash
      run: |
        set -euo pipefail

        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "${tmp_dir}"' EXIT

        charts_file="${tmp_dir}/charts.txt"
        commit_versions_file="${tmp_dir}/commit-versions.txt"
        rolling_versions_file="${tmp_dir}/rolling-versions.txt"
        payload_file="${RUNNER_TEMP}/pr-preview-comment-payload.json"

        printf '%s\n' "${{ steps.prepare.outputs.charts }}" > "${charts_file}"

        echo "${{ inputs.ghcr-password }}" | helm registry login ghcr.io -u "${{ inputs.ghcr-username }}" --password-stdin

        python3 "${{ github.action_path }}/../../scripts/publish_pr_preview_charts.py" publish \
          --charts-root "${{ inputs.source-root }}/charts" \
          --charts-file "${charts_file}" \
          --pr-number "${{ inputs.pr-number }}" \
          --head-sha "${{ inputs.head-sha }}" \
          --mode rolling \
          --oci-registry "oci://${{ inputs.preview-registry }}" \
          --versions-output "${rolling_versions_file}"

        python3 "${{ github.action_path }}/../../scripts/publish_pr_preview_charts.py" publish \
          --charts-root "${{ inputs.source-root }}/charts" \
          --charts-file "${charts_file}" \
          --pr-number "${{ inputs.pr-number }}" \
          --head-sha "${{ inputs.head-sha }}" \
          --mode commit \
          --oci-registry "oci://${{ inputs.preview-registry }}" \
          --versions-output "${commit_versions_file}"

        {
          echo "## PR preview charts"
          echo
          echo "Published preview charts as \`*-pr\` packages to \`oci://${{ inputs.preview-registry }}\`."
          echo
          echo "Rolling preview versions look like \`1.0.1-pr.${{ inputs.pr-number }}\`."
          echo
          echo "Immutable commit preview versions look like \`1.0.1-pr.${{ inputs.pr-number }}.${{ inputs.head-sha }}\`."
          echo
          echo "Charts:"
          while IFS='=' read -r chart version; do
            if [ -z "${chart}" ]; then
              continue
            fi
            immutable_version="$(grep "^${chart}=" "${commit_versions_file}" | cut -d= -f2-)"
            preview_chart="${chart}-pr"
            echo "- \`${chart}\`"
            echo "  - package: \`oci://${{ inputs.preview-registry }}/${preview_chart}\`"
            echo "  - rolling version: \`${version}\`"
            echo "  - immutable version: \`${immutable_version}\`"
          done < "${rolling_versions_file}"
          echo
          first_chart="$(sed -n '1p' "${charts_file}")"
          if [ -n "${first_chart}" ]; then
            preview_chart="${first_chart}-pr"
            first_version="$(grep "^${first_chart}=" "${rolling_versions_file}" | cut -d= -f2-)"
            echo "Example install for the latest build on this PR:"
            echo '```bash'
            echo "helm upgrade --install \"${preview_chart}\" \"oci://${{ inputs.preview-registry }}/${preview_chart}\" \\"
            echo "  --version \"${first_version}\" \\"
            echo "  --namespace \"${first_chart}\" \\"
            echo "  --create-namespace \\"
            echo "  --values \"./${first_chart}-values.yaml\""
            echo '```'
          fi
        } >> "${GITHUB_STEP_SUMMARY}"
        CHARTS_FILE="${charts_file}" \
        ROLLING_VERSIONS_FILE="${rolling_versions_file}" \
        COMMIT_VERSIONS_FILE="${commit_versions_file}" \
        python3 <<'PY' > "${payload_file}"
        import json
        import os
        import pathlib

        charts_file = pathlib.Path(os.environ["CHARTS_FILE"])
        rolling_versions_file = pathlib.Path(os.environ["ROLLING_VERSIONS_FILE"])
        commit_versions_file = pathlib.Path(os.environ["COMMIT_VERSIONS_FILE"])

        charts = [line.strip() for line in charts_file.read_text().splitlines() if line.strip()]
        rolling_versions = {}
        for line in rolling_versions_file.read_text().splitlines():
            if "=" in line:
                chart, version = line.split("=", 1)
                rolling_versions[chart] = version

        commit_versions = {}
        for line in commit_versions_file.read_text().splitlines():
            if "=" in line:
                chart, version = line.split("=", 1)
                commit_versions[chart] = version

        payload = {
            "registry": "${{ inputs.preview-registry }}",
            "prNumber": "${{ inputs.pr-number }}",
            "charts": [
                {
                    "chart": chart,
                    "previewChart": f"{chart}-pr",
                    "rollingVersion": rolling_versions[chart],
                    "immutableVersion": commit_versions[chart],
                }
                for chart in charts
            ],
        }

        print(json.dumps(payload, separators=(",", ":")))
        PY

    - name: Write no-op summary
      if: steps.prepare.outputs.has_charts != 'true'
      shell: bash
      run: |
        {
          echo "## PR preview charts"
          echo
          echo "No changed charts were detected for preview publishing."
        } >> "${GITHUB_STEP_SUMMARY}"
        printf '%s' '{"registry":"${{ inputs.preview-registry }}","prNumber":"${{ inputs.pr-number }}","charts":[]}' > "${RUNNER_TEMP}/pr-preview-comment-payload.json"

    - name: Export comment payload
      id: payload
      shell: bash
      run: |
        {
          echo "comment_payload<<EOF"
          cat "${RUNNER_TEMP}/pr-preview-comment-payload.json"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
