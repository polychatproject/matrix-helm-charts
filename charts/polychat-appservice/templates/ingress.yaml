{{- if .Values.api.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "polychat-appservice.fullname" . }}
  labels:
    {{- include "polychat-appservice.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.api.ingress.tls.certManager.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ . | quote }}
    {{- end }}
    {{- with .Values.api.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.api.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.api.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required ".Values.api.ingress.host is required" .Values.api.ingress.host | quote }}
      secretName: {{ include "polychat-appservice.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ required ".Values.api.ingress.host is required" .Values.api.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "polychat-appservice.fullname" . }}
                port:
                  name: api
{{- end }}
