{{- if and .Values.appservice.registration.autoGenerate (not .Values.appservice.registration.existingSecret) }}
{{- $name := printf "%s-tokens" (include "polychat-appservice.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "polychat-appservice.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $existing }}
  asToken: {{ index $existing.data "asToken" | b64dec | quote }}
  hsToken: {{ index $existing.data "hsToken" | b64dec | quote }}
  {{- else }}
  asToken: {{ randAlphaNum 64 | quote }}
  hsToken: {{ randAlphaNum 64 | quote }}
  {{- end }}
{{- end }}
