apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "polychat-appservice.fullname" . }}
  labels:
    {{- include "polychat-appservice.labels" . | nindent 4 }}
  {{- if .Values.imageStreamRolloutTrigger.enabled }}
  annotations:
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"{{ .Values.imageStreamRolloutTrigger.imageStreamTag }}"},"fieldPath":"spec.template.spec.containers[?(@.name==\"polychat-appservice\")].image"}]
  {{- end }}
spec:
  # Singleton — pool state lives in memory.
  serviceName: {{ include "polychat-appservice.fullname" . }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "polychat-appservice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "polychat-appservice.labels" . | nindent 8 }}
      annotations:
        checksum/registration: {{ include (print $.Template.BasePath "/registration-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "polychat-appservice.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: polychat-appservice
          {{- if .Values.imageStreamRolloutTrigger.enabled }}
          # When the OpenShift ImageStream trigger is on, the
          # image-trigger controller writes spec.containers[].image
          # itself (resolving the tag to a digest). Leaving an explicit
          # image: here would cause a server-side-apply conflict with
          # openshift-controller-manager.
          {{- else }}
          image: {{ include "polychat-appservice.image" . | quote }}
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: appservice
              containerPort: {{ .Values.appservice.port }}
              protocol: TCP
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: HOMESERVER_NAME
              value: {{ required ".Values.serverName is required" .Values.serverName | quote }}
            - name: HOMESERVER_URL
              value: {{ required ".Values.homeserverUrl is required" .Values.homeserverUrl | quote }}
            - name: PATH_CONFIG
              value: /config
            - name: PATH_DATA
              value: /data
            - name: APPSERVICE_PORT
              value: {{ .Values.appservice.port | quote }}
            - name: APPSERVICE_BIND_ADDRESS
              value: {{ .Values.appservice.bindAddress | quote }}
            - name: API_PORT
              value: {{ .Values.api.port | quote }}
            - name: API_BIND_ADDRESS
              value: {{ .Values.api.bindAddress | quote }}
            - name: SUB_ROOMS_POOL_TARGET
              value: {{ .Values.subRoomsPoolTarget | quote }}
            - name: LOAD_EXISTING_ROOMS
              value: {{ .Values.loadExistingRooms | quote }}
            {{- with .Values.debugMxid }}
            - name: DEBUG_MXID
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.networks.irc.bridgeMxid }}
            - name: IRC_BRIDGE_MXID
              value: {{ . | quote }}
            - name: IRC_BRIDGE_SERVER
              value: {{ $.Values.networks.irc.server | quote }}
            {{- end }}
            {{- if .Values.networks.matrix.enabled }}
            - name: MATRIX_BRIDGE_ENABLED
              value: "true"
            - name: MATRIX_BRIDGE_ACCOUNT_MXIDS
              value: {{ join "," .Values.networks.matrix.accountMxids | quote }}
            {{- end }}
            {{- with .Values.networks.signal.bridgeMxid }}
            - name: SIGNAL_BRIDGE_MXID
              value: {{ . | quote }}
            - name: SIGNAL_BRIDGE_ACCOUNT_MXIDS
              value: {{ join "," $.Values.networks.signal.accountMxids | quote }}
            - name: SIGNAL_BRIDGE_COMMAND_PREFIX
              value: {{ $.Values.networks.signal.commandPrefix | quote }}
            {{- end }}
            {{- with .Values.networks.telegram.bridgeMxid }}
            - name: TELEGRAM_BRIDGE_MXID
              value: {{ . | quote }}
            - name: TELEGRAM_BRIDGE_ACCOUNT_MXIDS
              value: {{ join "," $.Values.networks.telegram.accountMxids | quote }}
            - name: TELEGRAM_BRIDGE_TUG_MXID
              value: {{ $.Values.networks.telegram.tugMxid | quote }}
            - name: TELEGRAM_BRIDGE_COMMAND_PREFIX
              value: {{ $.Values.networks.telegram.commandPrefix | quote }}
            {{- end }}
            {{- with .Values.networks.whatsapp.bridgeMxid }}
            - name: WHATSAPP_BRIDGE_MXID
              value: {{ . | quote }}
            - name: WHATSAPP_BRIDGE_ACCOUNT_MXIDS
              value: {{ join "," $.Values.networks.whatsapp.accountMxids | quote }}
            - name: WHATSAPP_BRIDGE_COMMAND_PREFIX
              value: {{ $.Values.networks.whatsapp.commandPrefix | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "polychat-appservice.fullname" . }}-registration
            items:
              - key: registration.yaml
                path: registration.yaml
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
  {{- end }}
